apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kargo-argocd-observer
  labels:
    app.kubernetes.io/name: kargo-argocd-observer
rules:
  # Watch ArgoCD Applications cluster-wide to detect the deployed version.
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch

  # Read Kargo's view of the world: Stages, Freight, Warehouses, and existing Promotions.
  - apiGroups:
      - kargo.akuity.io
    resources:
      - stages
      - freights
      - warehouses
      - promotions
    verbs:
      - get
      - list
      - watch

  # Create Promotions when drift between ArgoCD and Kargo is detected.
  - apiGroups:
      - kargo.akuity.io
    resources:
      - promotions
    verbs:
      - create

  # Kargo's admission webhook SubjectAccessReview-checks this virtual verb when a Promotion is created
  - apiGroups:
      - kargo.akuity.io
    resources:
      - stages
    verbs:
      - promote

  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
