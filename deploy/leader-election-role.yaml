apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kargo-argocd-observer
  namespace: kargo-observer
  labels:
    app.kubernetes.io/name: kargo-argocd-observer
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kargo-argocd-observer
  namespace: kargo-observer
  labels:
    app.kubernetes.io/name: kargo-argocd-observer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kargo-argocd-observer
subjects:
  - kind: ServiceAccount
    name: kargo-argocd-observer
    namespace: kargo-observer
