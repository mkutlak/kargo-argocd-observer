name: CI — Helm Chart

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - "mise.toml"
      - ".github/workflows/ci-chart.yml"

permissions:
  contents: read

jobs:
  chart-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Lint chart
        run: mise run helm:lint

      - name: Template chart (validate rendering)
        run: mise run helm:template
