name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "mise.toml"
      - ".golangci.yml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  check:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2

      - name: Cache Go build & modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: go vet
        run: mise run vet

      - name: golangci-lint
        run: mise run lint

      - name: go test
        run: mise run test
