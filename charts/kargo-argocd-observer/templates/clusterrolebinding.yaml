{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kargo-argocd-observer.fullname" . }}
  {{- with (include "kargo-argocd-observer.commonAnnotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "kargo-argocd-observer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kargo-argocd-observer.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kargo-argocd-observer.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
