apiVersion: v1
kind: Service
metadata:
  name: {{ include "kargo-argocd-observer.fullname" . }}
  labels:
    {{- include "kargo-argocd-observer.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kargo-argocd-observer.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.service.port }}
      targetPort: metrics
